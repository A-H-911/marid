name: ci

# Marid CI skeleton (WBS-0.3). Replaces upstream's org-specific workflows (blacksmith
# runners + `dev` branch + TEAM_MEMBERS governance) with GitHub-hosted runners.
# Commands reused from upstream (oxlint, `bun turbo typecheck`, `bun turbo test`) per DEC-009.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - run: bun lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - run: bun typecheck

  unit:
    name: unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      # Windows GitHub runners lack ripgrep; without it opencode falls back to
      # downloading rg + a PowerShell Expand-Archive that fails in CI. Install it
      # so `which("rg.exe")` short-circuits the download path. (Linux runners ship rg.)
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y
      - name: Prepare temp dir on workspace drive (Windows)
        if: runner.os == 'Windows'
        run: mkdir -p /d/opencode-tmp
      - name: Run unit tests
        # marid: two independent, MEASURED Windows-runner facts, both fixed here in
        # ci.yml (durable — never touched by upstream syncs) so no test-body edits drift:
        #   1) The whole unit step is inherently ~18-22min on cold 2-core Windows runners
        #      (git/process spawn is slow) and varies run-to-run; a 20min cap crossed it
        #      intermittently -> job-timeout flakes. 35min absorbs the variance. This costs
        #      nothing on green runs (a cap only bounds; slow runs already ran long and now
        #      FINISH instead of failing at 20min and forcing a paid re-run).
        #   2) Several git-heavy tests exceed bun's 5s default per-test cap: snapshot
        #      worktree/index ops AND workspace "sync history" (git init + sync polling,
        #      measured ~24s on a cold runner). A 60s global cap clears the whole known
        #      range (<=~24s observed) with margin even under runner variance; the 35min
        #      job cap above is the real hang-backstop, so a generous per-test cap costs
        #      nothing on green runs (legit tests finish on their own; a cap only bounds).
        timeout-minutes: 35
        run: GITHUB_ACTIONS=false bun turbo test -- --timeout 60000
        env:
          OPENCODE_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}
          # marid: ONE knob for every timing budget (P-CI-4). All timing flakes here share
          # one root cause: budgets calibrated for fast dev machines / upstream's warm
          # blacksmith runners, running on slow load-variable free runners. TIMING_SCALE
          # (test/lib/effect.ts) is read at the choke points every budget flows through —
          # testEffect wrappers (explicit per-test budgets; bun lets those OVERRIDE the
          # global --timeout, so the 60s cap alone can't protect them), poll/await helper
          # ceilings, and the cli-process subprocess kill + serve-ready deadlines.
          # Windows 4 (2-core, slowest; measured); ubuntu 2 (observed 30s subprocess kill
          # flake under concurrent transpile stampede). Local default: 1 (unchanged).
          OPENCODE_TIMING_SCALE: ${{ runner.os == 'Windows' && '4' || '2' }}
          # marid: put os.tmpdir() on the workspace drive (D:) at a path with NO single-letter first
          # component. GitHub windows-latest workspace is D:\a\...; temp under \a\ (e.g. runner.temp =
          # D:\a\_temp) makes drive-stripped test paths "/a/..." get misread by FSUtil.windowsPath as
          # drive A:. D:\opencode-tmp shares the workspace drive AND avoids that misread, fixing the
          # path-permission tests via the environment (no test edits) so syncs never reintroduce them.
          TMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
          TEMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
      # marid (WBS-1.2/1.3): TEST-AUTH. @marid/auth is not enumerated in turbo.json,
      # so run its suite directly. Dependency-free + OS-agnostic (posix-only 0600
      # assertions self-skip on Windows), so no extra env needed.
      - name: Run marid-auth tests
        run: bun --cwd packages/marid-auth test
      # marid (WBS-2.1/2.2): TEST-INST fast unit tier — env composition (every
      # R-05 row), registry, and lifecycle via a tiny fake server (no opencode
      # boot). Dependency-free, cross-OS. The heavy live 2-instance proof runs in
      # the dedicated 3-OS marid-isolation job below (KPI-003).
      - name: Run marid-instance unit tests
        run: bun --cwd packages/marid-instance test
      # marid (WBS-4.1..4.5): TEST-TG unit tier — redact, allowlist, dedup, router
      # (AC-010), format/split, streaming cadence (AC-011), permission keyboard
      # exactly-once/timeout/races (AC-012), policy, media. Deterministic (injected
      # clock + fakes), no network. The live round trip runs in the dedicated 3-OS
      # marid-telegram job below (KPI-002).
      - name: Run marid-telegram unit tests
        run: bun --cwd packages/marid-telegram test
      # marid (WBS-6.1): the channel-agnostic firehose client extracted from the
      # Telegram gateway (ADR-0011) — event-pump + per-part streaming + permission-ask
      # parse. Dependency-free, cross-OS, injected fakes (no network).
      - name: Run marid-channel-client unit tests
        run: bun --cwd packages/marid-channel-client test

  smoke:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # ponytail: skeleton smoke = workspace installs + native node-pty postinstall builds
      # on all 3 OSes (the real cross-OS risk). A CLI boot/--version smoke gets added once
      # non-interactive flags are confirmed (WBS-1.x / EXP-004). Upgrade path: add a run step here.
      - uses: ./.github/actions/bun-install

  # marid (WBS-1.1 / MS-002): the marid distribution profile builds a single `marid`
  # binary from src/marid.ts on all 3 OSes, and the build script self-smokes it
  # (`marid --version`). Excluded packages are absent by construction (hygiene test +
  # EXP-004 Q1). --skip-install: the current-platform native modules from bun-install
  # already suffice for a --single build (the cross-platform install is release-only).
  marid-build:
    name: marid-build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - name: Build marid binary + smoke (--version)
        run: bun run script/marid-build.ts --single --skip-install
        working-directory: packages/opencode

  # marid (WBS-2.3 / MS-003 / KPI-003): the multi-instance isolation proof on 3
  # OSes. Launches two REAL authenticated `marid serve` instances with fully
  # composed per-instance env and asserts zero cross-instance interference across
  # the R-05 conflict inventory (distinct ports, per-instance DB/sessions, no
  # state written outside the composed XDG roots — the deferred EXP-002 live
  # diff). Gated by MARID_ISOLATION=1 so it stays out of the 2-OS unit job.
  # Inherits the unit job's Windows-runner workarounds because it boots a full
  # opencode server; timing rides OPENCODE_TIMING_SCALE (P-CI-4), not a new knob.
  marid-isolation:
    name: marid-isolation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y
      - name: Prepare temp dir on workspace drive (Windows)
        if: runner.os == 'Windows'
        run: mkdir -p /d/opencode-tmp
      - name: Run multi-instance isolation suite (2 real instances)
        run: bun test test/marid/instance-isolation.test.ts --timeout 300000
        working-directory: packages/opencode
        env:
          MARID_ISOLATION: "1"
          OPENCODE_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}
          OPENCODE_TIMING_SCALE: ${{ runner.os == 'Windows' && '4' || '2' }}
          TMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
          TEMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}

  # marid (WBS-3.1/3.2/3.3 / MS-004 / KPI-001): the §7 cross-interface flow on 3
  # OSes. Boots a REAL authenticated `marid serve` subprocess driven by a
  # TestLLMServer and asserts the acceptance demo (API-started session discovered +
  # continued by a second client, subscriber sees both), the EXP-001 concurrency
  # authority through the wrapper, and no state loss across a server restart. Gated
  # by MARID_SYNC=1 so it stays out of the 2-OS unit job; same Windows workarounds +
  # OPENCODE_TIMING_SCALE (P-CI-4) as the isolation job.
  marid-sync:
    name: marid-sync (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y
      - name: Prepare temp dir on workspace drive (Windows)
        if: runner.os == 'Windows'
        run: mkdir -p /d/opencode-tmp
      - name: Run cross-interface sync suite (§7 flow, concurrency, restart)
        run: bun test test/marid/cross-interface.test.ts --timeout 300000
        working-directory: packages/opencode
        env:
          MARID_SYNC: "1"
          OPENCODE_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}
          OPENCODE_TIMING_SCALE: ${{ runner.os == 'Windows' && '4' || '2' }}
          TMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
          TEMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}

  marid-telegram:
    name: marid-telegram (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y
      - name: Prepare temp dir on workspace drive (Windows)
        if: runner.os == 'Windows'
        run: mkdir -p /d/opencode-tmp
      # TEST-TG live tier (KPI-002): the Telegram round trip (AC-010 stranger ignored,
      # AC-011 streamed reply) against a real `marid serve` + fake LLM + local fake
      # Telegram server. Gated by MARID_TELEGRAM=1 (describe.skip otherwise).
      - name: Run Telegram gateway live suite
        # Bounded retry-wrapper (operator-chosen, defence-in-depth). This live E2E rides the SSE
        # firehose over loopback; on cold Windows CI the connection can be slow/flaky to establish.
        # The firehose pump now RECONNECTS on drop (capped backoff, @marid/channel-client, WBS-6.5),
        # so a mid-stream drop auto-recovers — the retry wrapper remains only as a backstop against
        # first-subscribe/cold-start flake. Each attempt re-runs setup fresh; a hang fails fast at
        # ~110s (the 100s waitFor), so 3× is ~6min worst case. Deterministic AC-010/011/012 coverage
        # lives in router/stream/permission/gateway-integration tests.
        run: |
          for attempt in 1 2 3; do
            echo "::group::telegram live E2E — attempt ${attempt}/3"
            if bun test test/marid/telegram.test.ts --timeout 300000; then
              echo "::endgroup::"
              echo "telegram live E2E passed on attempt ${attempt}/3"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::telegram live E2E failed attempt ${attempt}/3 (intermittent firehose stall — RISK-006)"
          done
          echo "::error::telegram live E2E failed after 3 attempts"
          exit 1
        working-directory: packages/opencode
        env:
          MARID_TELEGRAM: "1"
          OPENCODE_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}
          OPENCODE_TIMING_SCALE: ${{ runner.os == 'Windows' && '4' || '2' }}
          TMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
          TEMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
