name: ci

# Marid CI skeleton (WBS-0.3). Replaces upstream's org-specific workflows (blacksmith
# runners + `dev` branch + TEAM_MEMBERS governance) with GitHub-hosted runners.
# Commands reused from upstream (oxlint, `bun turbo typecheck`, `bun turbo test`) per DEC-009.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - run: bun lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      - run: bun typecheck

  unit:
    name: unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/bun-install
      # Windows GitHub runners lack ripgrep; without it opencode falls back to
      # downloading rg + a PowerShell Expand-Archive that fails in CI. Install it
      # so `which("rg.exe")` short-circuits the download path. (Linux runners ship rg.)
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y
      - name: Prepare temp dir on workspace drive (Windows)
        if: runner.os == 'Windows'
        run: mkdir -p /d/opencode-tmp
      - name: Run unit tests
        # marid: two independent, MEASURED Windows-runner facts, both fixed here in
        # ci.yml (durable — never touched by upstream syncs) so no test-body edits drift:
        #   1) The whole unit step is inherently ~18-22min on cold 2-core Windows runners
        #      (git/process spawn is slow) and varies run-to-run; a 20min cap crossed it
        #      intermittently -> job-timeout flakes. 35min absorbs the variance. This costs
        #      nothing on green runs (a cap only bounds; slow runs already ran long and now
        #      FINISH instead of failing at 20min and forcing a paid re-run).
        #   2) Several git-heavy tests exceed bun's 5s default per-test cap: snapshot
        #      worktree/index ops AND workspace "sync history" (git init + sync polling,
        #      measured ~24s on a cold runner). A 60s global cap clears the whole known
        #      range (<=~24s observed) with margin even under runner variance; the 35min
        #      job cap above is the real hang-backstop, so a generous per-test cap costs
        #      nothing on green runs (legit tests finish on their own; a cap only bounds).
        timeout-minutes: 35
        run: GITHUB_ACTIONS=false bun turbo test -- --timeout 60000
        env:
          OPENCODE_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}
          # marid: ONE knob for every timing budget (P-CI-4). All timing flakes here share
          # one root cause: budgets calibrated for fast dev machines / upstream's warm
          # blacksmith runners, running on slow load-variable free runners. TIMING_SCALE
          # (test/lib/effect.ts) is read at the choke points every budget flows through —
          # testEffect wrappers (explicit per-test budgets; bun lets those OVERRIDE the
          # global --timeout, so the 60s cap alone can't protect them), poll/await helper
          # ceilings, and the cli-process subprocess kill + serve-ready deadlines.
          # Windows 4 (2-core, slowest; measured); ubuntu 2 (observed 30s subprocess kill
          # flake under concurrent transpile stampede). Local default: 1 (unchanged).
          OPENCODE_TIMING_SCALE: ${{ runner.os == 'Windows' && '4' || '2' }}
          # marid: put os.tmpdir() on the workspace drive (D:) at a path with NO single-letter first
          # component. GitHub windows-latest workspace is D:\a\...; temp under \a\ (e.g. runner.temp =
          # D:\a\_temp) makes drive-stripped test paths "/a/..." get misread by FSUtil.windowsPath as
          # drive A:. D:\opencode-tmp shares the workspace drive AND avoids that misread, fixing the
          # path-permission tests via the environment (no test edits) so syncs never reintroduce them.
          TMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}
          TEMP: ${{ runner.os == 'Windows' && 'D:\opencode-tmp' || runner.temp }}

  smoke:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # ponytail: skeleton smoke = workspace installs + native node-pty postinstall builds
      # on all 3 OSes (the real cross-OS risk). A CLI boot/--version smoke gets added once
      # non-interactive flags are confirmed (WBS-1.x / EXP-004). Upgrade path: add a run step here.
      - uses: ./.github/actions/bun-install
